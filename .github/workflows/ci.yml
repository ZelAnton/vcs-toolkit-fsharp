name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      # Config is .yamllint.yml — tuned for Actions YAML. Real defects (tabs,
      # duplicate keys, bad indentation) fail; cosmetic line-length stays a
      # non-failing warning.
      - name: Lint YAML
        run: yamllint .

  format:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA (supply-chain hardening); the
      # trailing comment records the human-readable version. Dependabot bumps the
      # SHA and updates the comment on its weekly run.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'

      # Fantomas is the F# formatter and this repo's style authority — the F#
      # compiler does not enforce .editorconfig style the way Roslyn does for C#.
      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet fantomas --check src tests

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'

      # Cache the global NuGet package folder across runs. Keyed on the central
      # version files so the cache invalidates only when dependencies change.
      # The `v2` namespace deliberately abandons every pre-existing cache: ProcessKit 2.0.0
      # moved from a vendored pre-release (bundled under local-packages/) to the published
      # nuget.org package. The two share the version number but differ in API, so an older
      # cache holding the vendored 2.0.0 would shadow the published one (NuGet treats a
      # version as immutable and never re-downloads it) and break the build.
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-v2-${{ hashFiles('Directory.Packages.props', 'nuget.config', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-v2-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Install jj (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          JJ_VERSION: '0.42.0'
        run: |
          install_dir="$RUNNER_TEMP/jj"
          if [ "$RUNNER_OS" = "macOS" ] && [ "$(uname -m)" = "arm64" ]; then
            target="aarch64-apple-darwin"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            target="x86_64-apple-darwin"
          else
            target="x86_64-unknown-linux-musl"
          fi
          archive="jj-v${JJ_VERSION}-${target}.tar.gz"
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/$archive" "https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/$archive"
          mkdir -p "$install_dir"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$install_dir"
          test -x "$install_dir/jj"
          "$install_dir/jj" --version
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Install jj (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          JJ_VERSION: '0.42.0'
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP 'jj'
          $archive = "jj-v$env:JJ_VERSION-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri "https://github.com/jj-vcs/jj/releases/download/v$env:JJ_VERSION/$archive" -OutFile (Join-Path $env:RUNNER_TEMP $archive)
          Expand-Archive -LiteralPath (Join-Path $env:RUNNER_TEMP $archive) -DestinationPath $installDir
          $binary = Join-Path $installDir 'jj.exe'
          if (-not (Test-Path -LiteralPath $binary)) { throw "jj binary was not extracted to $binary" }
          & $binary --version
          $installDir | Add-Content -LiteralPath $env:GITHUB_PATH

      - name: Test
        env:
          REQUIRE_JJ: '1'
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      # Test results are uploaded even when the Test step fails, so a red CI run
      # can be diagnosed from the .trx without re-running locally.
      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/*.trx
          if-no-files-found: ignore
