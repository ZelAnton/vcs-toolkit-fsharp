name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      # Config is .yamllint.yml — tuned for Actions YAML. Real defects (tabs,
      # duplicate keys, bad indentation) fail; cosmetic line-length stays a
      # non-failing warning.
      - name: Lint YAML
        run: yamllint .

  format:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA (supply-chain hardening); the
      # trailing comment records the human-readable version. Dependabot bumps the
      # SHA and updates the comment on its weekly run.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      # Fantomas is the F# formatter and this repo's style authority — the F#
      # compiler does not enforce .editorconfig style the way Roslyn does for C#.
      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet fantomas --check src tests

  # F# static analysis — the compiled-language counterpart of the `format` check, and the
  # only F#-class static analysis available (CodeQL has no F# support). Ionide.Analyzers
  # (Directory.Packages.props) is driven by the pinned `fsharp-analyzers` tool
  # (.config/dotnet-tools.json) over every src/ project. scripts/run-analyzers.ps1 restores
  # the tool, builds the solution (the analyzers type-check against the built assemblies),
  # runs the analyzers, and FAILS the job on any Warning/Error finding — not warn-only.
  analyzers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-v2-${{ hashFiles('Directory.Packages.props', 'nuget.config', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-v2-

      - name: Run F# analyzers
        shell: pwsh
        run: ./scripts/run-analyzers.ps1

  # `dotnet pack` otherwise runs only in the release workflow, so a regression
  # in the packaging mechanics (the post-pack sibling-dependency rewrite in
  # Directory.Build.targets, README/icon/XML-doc inclusion, the `vcs-mcp`
  # DotnetTool layout) would surface only at release time. This job packs the
  # whole solution and validates the resulting .nupkg artifacts on every PR
  # instead, via scripts/validate-packages.ps1.
  pack-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-v2-${{ hashFiles('Directory.Packages.props', 'nuget.config', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-v2-

      - name: Restore
        run: dotnet restore

      # Packs every packable project in the solution (the test projects are
      # IsPackable=false), producing one .nupkg/.snupkg per VcsToolkit.*
      # library plus the vcs-mcp .NET global tool — mirrors the Pack step in
      # .github/workflows/release.yml, minus the version bump.
      - name: Pack
        run: dotnet pack VcsToolkit.slnx --configuration Release --output ./artifacts

      - name: Validate packages
        shell: pwsh
        run: ./scripts/validate-packages.ps1 -PackagesDir ./artifacts

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      # Cache the global NuGet package folder across runs. Keyed on the central
      # version files so the cache invalidates only when dependencies change.
      # The `v2` namespace deliberately abandons every pre-existing cache: ProcessKit 2.0.0
      # moved from a vendored pre-release (bundled under local-packages/) to the published
      # nuget.org package. The two share the version number but differ in API, so an older
      # cache holding the vendored 2.0.0 would shadow the published one (NuGet treats a
      # version as immutable and never re-downloads it) and break the build.
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-v2-${{ hashFiles('Directory.Packages.props', 'nuget.config', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-v2-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Install jj (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          JJ_VERSION: '0.42.0'
        run: |
          install_dir="$RUNNER_TEMP/jj"
          if [ "$RUNNER_OS" = "macOS" ] && [ "$(uname -m)" = "arm64" ]; then
            target="aarch64-apple-darwin"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            target="x86_64-apple-darwin"
          else
            target="x86_64-unknown-linux-musl"
          fi
          archive="jj-v${JJ_VERSION}-${target}.tar.gz"
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/$archive" "https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/$archive"
          mkdir -p "$install_dir"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$install_dir"
          test -x "$install_dir/jj"
          "$install_dir/jj" --version
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Install jj (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          JJ_VERSION: '0.42.0'
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP 'jj'
          $archive = "jj-v$env:JJ_VERSION-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri "https://github.com/jj-vcs/jj/releases/download/v$env:JJ_VERSION/$archive" -OutFile (Join-Path $env:RUNNER_TEMP $archive)
          Expand-Archive -LiteralPath (Join-Path $env:RUNNER_TEMP $archive) -DestinationPath $installDir
          $binary = Join-Path $installDir 'jj.exe'
          if (-not (Test-Path -LiteralPath $binary)) { throw "jj binary was not extracted to $binary" }
          & $binary --version
          $installDir | Add-Content -LiteralPath $env:GITHUB_PATH

      - name: Test
        env:
          REQUIRE_JJ: '1'
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      # Test results are uploaded even when the Test step fails, so a red CI run
      # can be diagnosed from the .trx without re-running locally.
      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/*.trx
          if-no-files-found: ignore

  # Optional live-integration job: stands up a real Gitea container and drives the
  # VcsToolkit.Gitea + Forge surface against it (see GiteaLiveTests.fs) so print-table
  # parsing is validated end-to-end and format drift on a tea/Gitea upgrade is caught.
  # Deliberately NOT a required check — it is a separate job that does not gate PRs and
  # leaves the `test` matrix untouched. Docker is preinstalled on the ubuntu runner; the
  # test harness starts and tears down the Gitea container itself. The suite is gated by
  # REQUIRE_GITEA_LIVE (opt-in), so it runs here but is skipped in the ordinary `test` job.
  gitea-live:
    runs-on: ubuntu-latest
    env:
      # Pin the Gitea image and the tea CLI so the job is reproducible; bump these to pick
      # up (and catch drift from) a newer server/CLI.
      GITEA_IMAGE: 'gitea/gitea:1.22'
      TEA_VERSION: '0.9.2'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-v2-${{ hashFiles('Directory.Packages.props', 'nuget.config', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-v2-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # tea has no JSON REST shape; a live run is the only thing that exercises its
      # print-table parser against a real server. Pinned + verified before use.
      - name: Install tea CLI
        shell: bash
        run: |
          install_dir="$RUNNER_TEMP/tea"
          mkdir -p "$install_dir"
          curl --fail --location --retry 3 --output "$install_dir/tea" "https://dl.gitea.com/tea/${TEA_VERSION}/tea-${TEA_VERSION}-linux-amd64"
          chmod +x "$install_dir/tea"
          "$install_dir/tea" --version
          echo "$install_dir" >> "$GITHUB_PATH"

      # REQUIRE_GITEA_LIVE=1 flips the opt-in suite from "skip" to "must run": a missing
      # Docker daemon or tea CLI here fails the job instead of silently skipping.
      - name: Run live Gitea tests
        env:
          REQUIRE_GITEA_LIVE: '1'
        run: >-
          dotnet test tests/VcsToolkit.Gitea.Tests/VcsToolkit.Gitea.Tests.fsproj
          --no-build --configuration Release
          --filter "FullyQualifiedName~VcsToolkit.Gitea.LiveTests"
          --logger "trx;LogFileName=gitea-live-results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-gitea-live
          path: ./TestResults/*.trx
          if-no-files-found: ignore
